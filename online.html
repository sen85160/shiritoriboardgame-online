<!DOCTYPE html>
<html>
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>しりとり盤ゲーム 完全版</title>
<style>
body { font-family:sans-serif; padding:10px; }
#modePage { text-align:center; }
#container{ display:flex; justify-content:center; align-items:flex-start; gap:30px; }
#board { display:grid; grid-template-columns:repeat(7,50px); gap:2px; margin-top:10px; }
.cell { 
  width:50px; 
  height:50px; 
  border:1px solid black; /* 枠線は元の黒に戻す */
  display:flex; 
  align-items:center; 
  justify-content:center; 
  font-size:20px;
  box-sizing:border-box;
  background: transparent; /* 背景を透明にして後ろの線を見せる */
}

.cell.startPoint{
  border-width:4px;
}
#logBox{ width:240px; height:400px; border:1px solid black; overflow-y:auto; padding:5px; background:#f8f8f8; }
.logEntry{ margin-bottom:5px; }


#resultOverlay{
  position: fixed;
  inset: 0;              /* top/left/right/bottom全部0 */
  display: none;
  z-index: 9999;
}

#resultOverlay.show{
  display: flex;
  justify-content: center;
  align-items: center;
}
  
/* 外枠：高さを固定し、中身を縦に並べる設定 */
.resultBox { 
  padding: 20px; 
  width: 90vw; 
  max-width: 600px; 
  max-height: 85vh; 
  text-align: center;
  display: flex;         
  flex-direction: column; 
  background: white;     
  border-radius: 10px;
  color: red;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
/* 敗北時（黒背景）の調整を上書き */
#resultOverlay.lose .resultBox {
  background: #1a1a1a;
  color: white;          /* 敗北時は白文字で見やすく */
}  

/* ログなどのコンテンツ部分：ここだけスクロールさせる */
.resultContent {
  overflow-y: auto;
  flex-grow: 1;          
  padding: 10px;
  margin-bottom: 10px;
}

/* ボタン部分：下に固定して線を引く */
.resultFooter {
  border-top: 1px solid rgba(0,0,0,0.1);
  padding-top: 15px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

/* 敗北時（黒背景）の色の調整 */
#resultOverlay.lose .resultBox { background: #1a1a1a; color: white; }
#resultOverlay.lose .resultFooter { border-top: 1px solid rgba(255,255,255,0.2); }
#resultOverlay.lose{
  background: rgba(0,0,0,0.9);
  color: white;
}

#resultOverlay.win{
  background: white;
  color: red;
}
.bigTitle{ font-size:60px; font-weight:bold; margin-bottom:20px; }
.resultBoard{ display:grid; grid-template-columns:repeat(7,40px); gap:2px; margin:15px auto; }
.resultCell{ width:40px; height:40px; border:1px solid gray; display:flex; align-items:center; justify-content:center; }
button{ margin:5px; padding:6px 12px; }
.resultCell.last {
  border: 2px solid blue;  /* 太くした */
}
  
#statusArea{
  margin-top:10px;
}

#aiThinking{
  display:none;
  color:blue;
  font-weight:bold;
  font-size:18px;
}

#validCountArea{
  color:red;
  font-weight:bold;
  font-size:18px;
  margin-top:5px;
}
  
@media (max-width: 600px) {
  #container {
    flex-direction: column;
    align-items: center;
  }
  #board {
    grid-template-columns: repeat(7, calc((100vw - 90px) / 7));
    margin: 0 auto;
  }
  .cell {
    width: calc((100vw - 90px) / 7);
    height: calc((100vw - 90px) / 7);
    font-size: 14px;
  }
  #logBox {
    width: 90vw;
  }
  #wordInput {
    width: 40vw;
  }
  
  #sidePanel {
    display: flex;
    flex-direction: column;
    width: 90vw;
  }
  #validCountArea { 
    order: 1;
    margin-top: 0;
  }
  #aiThinking { order: 2; }
  #surrenderButton { order: 3; }
  #trajectoryLabel { order: 4; }
  #logBox { order: 5; }
  #sidePanel h3 { order: 6; }
}
  
</style>

<script>
const board=document.getElementById("board");
const currentCharDisplay=document.getElementById("currentChar");
const currentPlayerDisplay=document.getElementById("currentPlayer");
const logBox=document.getElementById("logBox");

let lastChar="";
let lastIndex=24;
let mode="human";
let aiStrength=1;
let humanIsFirst=true;
let gameOver=false;
let usedWords=new Set();
let lastPlacedIdx=24;

let moveHistory = []; // 軌跡を保存する配列  
let timerInterval = null;
let playerATime = 0;
let playerBTime = 0;
let isTimerActive = false;  
  
const dirSymbol={
right:"→", left:"←", up:"↑", down:"↓",
upright:"↗", upleft:"↖", downright:"↘", downleft:"↙"
};



function toggleTurnSelect(){
  const selected = document.querySelector('input[name="mode"]:checked').value;
  const isAI = (selected === "ai");
  const isOnline = (selected === "online");

  document.getElementById("turnSelect").style.display = isAI ? "block" : "none";
  document.getElementById("aiSettings").style.display = isAI ? "block" : "none";
  document.getElementById("humanNames").style.display = (!isAI && !isOnline) ? "block" : "none";
  document.getElementById("onlineSettings").style.display = isOnline ? "block" : "none";
}

function toggleOnlineSettings(){
  const action = document.querySelector('input[name="onlineAction"]:checked').value;
  document.getElementById("createRoomSettings").style.display = (action === "create") ? "block" : "none";
  document.getElementById("joinRoomSettings").style.display = (action === "join") ? "block" : "none";
}
  
  
  
  
  
  
// 設定画面の出し分け
function toggleTimerSettings() {
  const useTimer = document.querySelector('input[name="useTimer"]:checked').value;
  document.getElementById("timerSettings").style.display = (useTimer === "yes") ? "block" : "none";
}

// 時間を減らす処理 (まるごと書き換え)
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (gameOver) return;

    // 現在画面に表示されている名前を取得
    const nowPlaying = currentPlayerDisplay.textContent;

    // Aさんのターンの場合
    if (nowPlaying === playerAName) {
      playerATime--;
      if (playerATime <= 0) timeUp(playerAName);
    } 
    // Bさんのターンの場合
    else if (nowPlaying === playerBName) {
      playerBTime--;
      if (playerBTime <= 0) timeUp(playerBName);
    }
    
    updateTimerDisplay(); // 毎秒、両方の表示を更新
  }, 1000);
}

  
function updateTimerDisplay() {
  const format = (seconds) => {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  };

  const aElem = document.getElementById("timeLeftA");
  const bElem = document.getElementById("timeLeftB");
  
  if (aElem) aElem.textContent = format(playerATime);
  if (bElem) bElem.textContent = format(playerBTime);
}

// 時間切れの処理
function timeUp(loserName) {
  clearInterval(timerInterval);
  const winnerName = (loserName === playerAName ? playerBName : playerAName);
  currentPlayerDisplay.textContent = winnerName; // 勝者をセット
  showResult("win", `${loserName}が時間切れのため`);
}  

function normalizeChar(c){
const m={"ゃ":"や","ゅ":"ゆ","ょ":"よ","ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お","っ":"つ"};
return m[c]||c;
}
  
function isHiraganaOnly(word){
  return /^[ぁ-ゖー]+$/.test(word);
}  

function getLastChar(word){
let chars=word.split("");
while(chars[chars.length-1]==="ー") chars.pop();
return normalizeChar(chars[chars.length-1]);
}

function createBoard(){
if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  // 2. タイマーが有効な場合、時間を初期設定（選択された分数）に戻す
  if (isTimerActive) {
    const limitSelect = document.getElementById("limitMinutes");
    const mins = parseInt(limitSelect.value) || 3;
    playerATime = mins * 60;
    playerBTime = mins * 60;
    
    // 画面上の数字を 03:00 などの初期状態に更新する
    updateTimerDisplay();
  }  
board.innerHTML="";
logBox.innerHTML="";
usedWords.clear()
moveHistory = []; // 履歴をリセット
const canvas = document.getElementById("lineCanvas");
if(canvas) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height); // キャンバスをクリア
}  
  
for(let i=0;i<49;i++){
let c=document.createElement("div");
c.className="cell";
board.appendChild(c);
}
lastChar="";
lastIndex=24;
lastPlacedIdx=24;


gameOver=false;
updateStartHighlight();
}


let playerAName = "A";
let playerBName = "B";
let humanFirst = true; // 先攻フラグ
  
function startGame(){
mode=document.querySelector('input[name="mode"]:checked').value;
  
 if(mode === "online"){
    const action = document.querySelector('input[name="onlineAction"]:checked').value;
    if(action === "create"){
      createRoom();
    } else {
      joinRoom();
    }
    return;
  }  
  
aiStrength=parseInt(document.getElementById("aiStrength").value);
if(mode==="ai"){
const order=document.querySelector('input[name="order"]:checked').value;
humanIsFirst=(order==="first");
}
else { // 人間vs人間
    playerAName = document.getElementById("playerAName").value.trim() || "A";
    playerBName = document.getElementById("playerBName").value.trim() || "B";
    humanFirst = document.querySelector('input[name="humanOrder"]:checked').value === "A";
  }
document.getElementById("modePage").style.display="none";
document.getElementById("gamePage").style.display="block";
createBoard();
// 入力欄を復活させ、中身を空にする
const firstCharInput = document.getElementById("firstCharInput");
firstCharInput.disabled = false;
firstCharInput.value = "";

const wordInput = document.getElementById("wordInput");
wordInput.value = "";  
  
if(mode === "ai") {
  const strengthMap = { 1: "(弱)", 2: "(中)", 3: "(強)", 4: "(最強)" };
  const aiFullName = "AI" + (strengthMap[aiStrength] || "");
  
  if (!humanIsFirst) {
    currentPlayerDisplay.textContent = aiFullName;
  } else {
    currentPlayerDisplay.textContent = "あなた";
  }
  // 内部の名前管理用（降参時などに使用）
  playerBName = aiFullName; 
} else {
  currentPlayerDisplay.textContent = humanFirst ? playerAName : playerBName;
}
// --- startGame 関数内の後半部分を以下に差し替え ---

// ラジオボタンから「あり・なし」を取得
const useTimerRadio = document.querySelector('input[name="useTimer"]:checked');
  const useTimer = useTimerRadio ? useTimerRadio.value : "no";

  if (mode === "human" && useTimer === "yes") {
    isTimerActive = true;
    const limitSelect = document.getElementById("limitMinutes");
    const mins = parseInt(limitSelect.value) || 3;
    
    playerATime = mins * 60;
    playerBTime = mins * 60;

    // ラベル（名前）を表示に反映
    document.getElementById("labelA").textContent = playerAName;
    document.getElementById("labelB").textContent = playerBName;

    // 先攻・後攻による色分け (humanFirst は startGame の上の方で決定されている変数)
    if (humanFirst) {
      document.getElementById("timerA").style.color = "#ff4d4d"; // A 赤
      document.getElementById("timerB").style.color = "#4d4dff"; // B 青
    } else {
      document.getElementById("timerA").style.color = "#4d4dff"; // A 青
      document.getElementById("timerB").style.color = "#ff4d4d"; // B 赤
    }

    // タイマーエリア全体を表示
    document.getElementById("timerArea").style.display = "block";
    
    updateTimerDisplay();
  } else {
    isTimerActive = false;
    // タイマーエリアがあれば隠す
    const tArea = document.getElementById("timerArea");
    if(tArea) tArea.style.display = "none";
    if (timerInterval) clearInterval(timerInterval);
  }
}
 
  
  

function setFirstChar(){
  let firstChar = document.getElementById("firstCharInput").value.trim();
  if(!firstChar){ alert("文字を入力してください"); return; }
  if(firstChar.length > 1){ alert("1文字だけ入力してください"); return; }
  if(!/^[ぁ-ん]$/.test(firstChar)){ alert("ひらがなを入力してください"); return; }

  lastChar = normalizeChar(firstChar[0]);
  board.children[24].textContent = lastChar;
  currentCharDisplay.textContent = lastChar;
  updateStartHighlight();
  document.getElementById("firstCharInput").disabled = true;

  if(mode === "online"){
    const db = window._db;
    const ref = window._ref;
    const update = window._update;
    update(ref(db, `rooms/${roomKey}`), {
      firstChar: lastChar,
      lastChar: lastChar,
      currentTurn: "first"
    });
    return;
  }

  if(mode === "human" && isTimerActive){ startTimer(); }
  if(mode === "ai" && !humanIsFirst){ setTimeout(aiTurn, 300); }
}
 

function switchPlayer() {
  if(mode === "human") {
    currentPlayerDisplay.textContent =
      currentPlayerDisplay.textContent === playerAName ? playerBName : playerAName;
  } else {
    // AIモード：現在の表示が「あなた」なら次は「AI」、「AI」なら次は「あなた」
    currentPlayerDisplay.textContent = 
      (currentPlayerDisplay.textContent === "あなた") ? "AI" : "あなた";
  }
}
  

function canPlace(word,row,col,dir){
for(let i=0;i<word.length;i++){
if(row<0||row>6||col<0||col>6)return false;
let idx=row*7+col;
let c=normalizeChar(word[i]);
if(board.children[idx].textContent!=="" &&
board.children[idx].textContent!==c)return false;

if(dir==="right")col++;
if(dir==="left")col--;
if(dir==="up")row--;
if(dir==="down")row++;
if(dir==="upright"){row--;col++;}
if(dir==="upleft"){row--;col--;}
if(dir==="downright"){row++;col++;}
if(dir==="downleft"){row++;col--;}
}
return true;
}

// 「ー」の前のマスを計算
function calculatePrevIndex(lastIdx, word, dir){
let row=Math.floor(lastIdx/7);
let col=lastIdx%7;
if(dir==="right") col--;
else if(dir==="left") col++;
else if(dir==="up") row++;
else if(dir==="down") row--;
else if(dir==="upright"){ row++; col--; }
else if(dir==="upleft"){ row++; col++; }
else if(dir==="downright"){ row--; col--; }
else if(dir==="downleft"){ row--; col++; }
return row*7+col;
}

function countHumanValidMoves() {
  const dictionary = dictionaryHard; // 人間はハード辞書固定
  const words = dictionary[lastChar] || [];
  let count = 0;

  for (let w of words) {
    if (usedWords.has(w)) continue;
    if (getLastChar(w) === "ん") continue;

    const dirs = Object.keys(dirSymbol);
    for (let d of dirs) {
      let row = Math.floor(lastIndex / 7);
      let col = lastIndex % 7;
      if (!canPlace(w, row, col, d)) continue;

      // 1マス以上新規マスを埋めるか
      let tempR = row, tempC = col, newPl = 0;
      for (let i = 0; i < w.length; i++) {
        let idx = tempR * 7 + tempC;
        if (board.children[idx].textContent === "") newPl++;
        if (d === "right") tempC++;
        else if (d === "left") tempC--;
        else if (d === "up") tempR--;
        else if (d === "down") tempR++;
        else if (d === "upright") { tempR--; tempC++; }
        else if (d === "upleft") { tempR--; tempC--; }
        else if (d === "downright") { tempR++; tempC++; }
        else if (d === "downleft") { tempR++; tempC--; }
      }
      if (newPl > 0) {
        count++;
        break; // この単語で置ける方向が1つでもあればOK
      }
    }
  }
  return count;
}

function getCurrentDictionary(){
  if(aiStrength === 3 || aiStrength === 4){
    return dictionaryHard; // 強・最強
  }
  return dictionaryEasy; // 弱・中
}

/* ===== AI探索対応 ===== */
function getValidMoves(){
  let directions = Object.keys(dirSymbol);
  let moves = [];
  for(let i = 0; i < 49; i++){
    if(i !== lastIndex) continue;

    let baseRow = Math.floor(i / 7);
    let baseCol = i % 7;
    let dictionary = (mode === "human") ? dictionaryHard : getCurrentDictionary();
    let wordList = dictionary[lastChar] || [];

    for(let w of wordList){
      if(!isHiraganaOnly(w)) continue;
      if(usedWords.has(w)) continue;
      if(getLastChar(w) === "ん") continue;

      for(let d of directions){
        if(canPlace(w, baseRow, baseCol, d)){
          let tempRow = baseRow;
          let tempCol = baseCol;
          let newPlaced = 0;

          for(let j = 0; j < w.length; j++){
            let idx = tempRow * 7 + tempCol;
            if(board.children[idx].textContent === "") newPlaced++;

            if(d === "right") tempCol++;
            else if(d === "left") tempCol--;
            else if(d === "up") tempRow--;
            else if(d === "down") tempRow++;
            else if(d === "upright"){ tempRow--; tempCol++; }
            else if(d === "upleft"){ tempRow--; tempCol--; }
            else if(d === "downright"){ tempRow++; tempCol++; }
            else if(d === "downleft"){ tempRow++; tempCol--; }
          }

          if(newPlaced > 0){
            moves.push({word: w, dir: d, startIndex: i});
          }
        }
      }
    }
  }
  return moves;
}
  
function aiTurn() {
  if (gameOver) return;
  const aiThinkingDiv = document.getElementById("aiThinking");
  aiThinkingDiv.style.display = "block";

  setTimeout(() => {
    // 1. まず、今の盤面でAIが打てる全合法手を取得
    let moves = getValidMoves();
    if (moves.length === 0) {
      aiThinkingDiv.style.display = "none";
      showResult("win", "AIが合法手なし");
      return;
    }

    let chosenMove;

    // 最強モード(4)の場合のみ2手先読みを実行
if (aiStrength === 4) {
      // 一次選考：長い順100個 + ランダム100個 = 計200個に絞る
      moves.sort((a, b) => b.word.length - a.word.length);
      let candidates = moves.slice(0, 100).concat(
        moves.slice(100).sort(() => 0.5 - Math.random()).slice(0, 100)
      );

      let bestScore = -Infinity;
      let bestMoves = [];

      for (let m of candidates) {
        // AIがmを置いたと仮定した「未来の盤面」を作る
        let boardAfterAI = simulateMove(Array.from(board.children, c => c.textContent), m);
        
        // その盤面で、人間が打てる反撃をリストアップ
        let humanResponses = getMovesForSim(boardAfterAI, m.word, m.startIndex, m.dir);

        // もし人間が反撃不能（AIの勝利確定）なら、その手を即採用
        if (humanResponses.length === 0) {
          chosenMove = m;
          break;
        }

        // 人間の反撃を「長い順」にソートし、上位15手だけを精査
        humanResponses.sort((a, b) => b.word.length - a.word.length);
        let topHumanMoves = humanResponses.slice(0, 15); 
        let minAiNextMoves = Infinity;

        for (let hm of topHumanMoves) {
          // 人間の反撃後の盤面を作る
          let boardAfterHuman = simulateMove(boardAfterAI, hm);
          // その後、AIが次に何手打てるか計算
          let aiNextOptions = getMovesForSim(boardAfterHuman, hm.word, hm.startIndex, hm.dir).length;
          
          // 人間は「AIを最も追い詰める（AIの次の選択肢が最小になる）手」を打つと仮定
          if (aiNextOptions < minAiNextMoves) {
            minAiNextMoves = aiNextOptions;
          }
        }

        // スコア評価： (人間に与える選択肢が少ないほど良い) + (自分の次の選択肢が多いほど良い)
        let score = (1000 / (humanResponses.length + 1)) + (minAiNextMoves * 15);
        if (minAiNextMoves === 0) score -= 5000; // 自分が詰む手は超大幅減点

        if (score > bestScore) {
          bestScore = score;
          bestMoves = [m];
        } else if (score === bestScore) {
          bestMoves.push(m);
        }
      }
      chosenMove = chosenMove || bestMoves[Math.floor(Math.random() * bestMoves.length)];

    } else if (aiStrength === 2) {
      // 中モード
      let candidates = moves.length > 100 ? moves.sort(() => 0.5 - Math.random()).slice(0, 100) : moves;
      let minHumanCount = Infinity;
      for (let m of candidates) {
        let boardAfterAI = simulateMove(Array.from(board.children, c => c.textContent), m);
        let humanCount = getMovesForSim(boardAfterAI, m.word, m.startIndex, m.dir).length;
        if (humanCount < minHumanCount) {
          minHumanCount = humanCount;
          chosenMove = m;
        }
      }
    } else {
      // 弱(1)・強(3) は完全ランダム
      chosenMove = moves[Math.floor(Math.random() * moves.length)];
    }

    // 決定した手を実行
    lastIndex = chosenMove.startIndex;
    document.getElementById("wordInput").value = chosenMove.word;
    document.getElementById("direction").value = chosenMove.dir;
    aiThinkingDiv.style.display = "none";
    placeWord(true);
  }, 100);
}

// 盤面を汚さずにシミュレーションするための関数
function simulateMove(currentBoardArray, move) {
  let newBoard = [...currentBoardArray];
  let r = Math.floor(move.startIndex / 7);
  let c = move.startIndex % 7;
  for (let i = 0; i < move.word.length; i++) {
    let idx = r * 7 + c;
    newBoard[idx] = normalizeChar(move.word[i]);
    if (move.dir === "right") c++;
    else if (move.dir === "left") c--;
    else if (move.dir === "up") r--;
    else if (move.dir === "down") r++;
    else if (move.dir === "upright") { r--; c++; }
    else if (move.dir === "upleft") { r--; c--; }
    else if (move.dir === "downright") { r++; c++; }
    else if (move.dir === "downleft") { r++; c--; }
  }
  return newBoard;
}

// 特定の盤面状態で、次のプレイヤーが打てる手を取得する関数
function getMovesForSim(tempBoardArray, lastWord, lastIdx, lastDir) {
  const dictionary = dictionaryHard;
  const nextChar = getLastChar(lastWord);
  
  // 次の開始位置を算出（placeWord内のロジックを再現）
  let nextIdx;
  if (lastWord.endsWith("ー")) {
    // 長音の場合は1マス戻る計算をここに入れる
    nextIdx = calculatePrevIndex(lastIdx, lastWord, lastDir); 
  } else {
    // 単語の最後の文字が置かれた位置を割り出す
    let r = Math.floor(lastIdx / 7);
    let c = lastIdx % 7;
    for(let i=0; i<lastWord.length-1; i++){
       if (lastDir === "right") c++;
       else if (lastDir === "left") c--;
       else if (lastDir === "up") r--;
       else if (lastDir === "down") r++;
       else if (lastDir === "upright") { r--; c++; }
       else if (lastDir === "upleft") { r--; c--; }
       else if (lastDir === "downright") { r++; c++; }
       else if (lastDir === "downleft") { r++; c--; }
    }
    nextIdx = r * 7 + c;
  }

  let possibleMoves = [];
  const words = dictionary[nextChar] || [];
  for (let w of words) {
    if(!isHiraganaOnly(w)) continue;
    if (usedWords.has(w) || getLastChar(w) === "ん") continue;
    for (let d of Object.keys(dirSymbol)) {
      // canPlaceOnTempBoard(仮盤面、単語、位置、方向) でチェック
      if (canPlaceOnTempBoard(tempBoardArray, w, nextIdx, d)) {
        possibleMoves.push({ word: w, dir: d, startIndex: nextIdx });
      }
    }
  }
  return possibleMoves;
}

// 仮盤面用の設置チェック関数
function canPlaceOnTempBoard(tempBoard, word, startIdx, dir) {
  let r = Math.floor(startIdx / 7);
  let c = startIdx % 7;
  let newChars = 0;
  for (let i = 0; i < word.length; i++) {
    if (r < 0 || r > 6 || c < 0 || c > 6) return false;
    let idx = r * 7 + c;
    let char = normalizeChar(word[i]);
    if (tempBoard[idx] !== "" && tempBoard[idx] !== char) return false;
    if (tempBoard[idx] === "") newChars++;
    if (dir === "right") c++;
    else if (dir === "left") c--;
    else if (dir === "up") r--;
    else if (dir === "down") r++;
    else if (dir === "upright") { r--; c++; }
    else if (dir === "upleft") { r--; c--; }
    else if (dir === "downright") { r++; c++; }
    else if (dir === "downleft") { r++; c--; }
  }
  return newChars > 0;
}
  
function simulateHumanValidMoves(tempBoardArray, lastWord) {
  const dictionary = dictionaryHard; // 人間は最強の辞書を使うと仮定
  let count = 0;
  
  // 1. AIが最後に置いた単語から、人間が開始すべき文字と位置を特定
  let nextChar = getLastChar(lastWord);
  let nextIdx;

  // AIが最後に置いたマスのインデックス(lastPlacedIdx)を使用
  // 長音「ー」で終わる場合は1マス戻る
  if (lastWord[lastWord.length - 1] === "ー") {
    nextIdx = calculatePrevIndex(lastPlacedIdx, lastWord, document.getElementById("direction").value);
  } else {
    nextIdx = lastPlacedIdx;
  }

  // 2. その位置から人間が置ける単語があるか全スキャン
  const words = dictionary[nextChar] || [];
  const dirs = Object.keys(dirSymbol);

  for (let w of words) {
    if (usedWords.has(w)) continue; // 既出単語は除外
    if (getLastChar(w) === "ん") continue;

    for (let d of dirs) {
      let r = Math.floor(nextIdx / 7);
      let c = nextIdx % 7;
      
      let possible = true;
      let newPl = 0;
      let tr = r, tc = c;

      // 単語が置けるかどうかのシミュレーション
      for (let i = 0; i < w.length; i++) {
        if (tr < 0 || tr > 6 || tc < 0 || tc > 6) { possible = false; break; }
        let idx = tr * 7 + tc;
        let char = normalizeChar(w[i]);
        
        // 仮の盤面(tempBoardArray)を参照して、文字が一致するか、空きマスかチェック
        if (tempBoardArray[idx] !== "" && tempBoardArray[idx] !== char) { 
          possible = false; 
          break; 
        }
        if (tempBoardArray[idx] === "") newPl++;
        
        // 方向移動
        if (d === "right") tc++;
        else if (d === "left") tc--;
        else if (d === "up") tr--;
        else if (d === "down") tr++;

function drawLines(canvasId, cellSize, gap) {
  const canvas = document.getElementById(canvasId);
  const boardElem = document.getElementById("board");
  const toggle = document.getElementById("showTrajectory");
  
  if (!canvas || !boardElem || !toggle) return;

  const ctx = canvas.getContext("2d");
  canvas.width = boardElem.clientWidth;
  canvas.height = boardElem.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!toggle.checked) return;

  moveHistory.forEach(move => {
    const fR = Math.floor(move.from / 7);
    const fC = move.from % 7;
    const tR = Math.floor(move.to / 7);
    const tC = move.to % 7;

    ctx.beginPath();
    ctx.strokeStyle = move.color;
    ctx.lineWidth = 10; 
    ctx.lineCap = "round";
    ctx.moveTo(fC * (cellSize + gap) + cellSize / 2, fR * (cellSize + gap) + cellSize / 2);
    ctx.lineTo(tC * (cellSize + gap) + cellSize / 2, tR * (cellSize + gap) + cellSize / 2);
    ctx.stroke();
  });
}

function getHintMoves(moves) {
  if (moves.length <= 3) return moves;
  
  // 最短単語の中からランダムに1つ
  const minLen = Math.min(...moves.map(m => m.word.length));
  const shortest = moves.filter(m => m.word.length === minLen);
  const pick1 = shortest[Math.floor(Math.random() * shortest.length)];
  
  // 最長単語の中からランダムに1つ
  const maxLen = Math.max(...moves.map(m => m.word.length));
  const longest = moves.filter(m => m.word.length === maxLen);
  const pick2 = longest[Math.floor(Math.random() * longest.length)];
  
  // 残りの中から完全ランダムに1つ
  const rest = moves.filter(m => m !== pick1 && m !== pick2);
  const pick3 = rest[Math.floor(Math.random() * rest.length)];
  
  return [pick1, pick2, pick3];
}

function createRoom(){
  roomKey = document.getElementById("roomKeyInput").value.trim();

  const order = document.querySelector('input[name="onlineOrder"]:checked').value;
  myRole = order;

  if(!roomKey){ alert("合言葉を入力してください"); return; }

  const db = window._db;
  const ref = window._ref;
  const set = window._set;
  const onValue = window._onValue;

  const roomRef = ref(db, `rooms/${roomKey}`);
  set(roomRef, {
    status: "waiting",
    first: myRole === "first" ? { name: myName } : null,
    second: myRole === "second" ? { name: myName } : null,
    firstChar: "",
    board: Array(49).fill(""),
    lastIndex: 24,

function joinRoom(){
  roomKey = document.getElementById("roomKeyJoinInput").value.trim();
  myName = document.getElementById("onlinePlayerNameJoin").value.trim() || "プレイヤー2";

  if(!roomKey){ alert("合言葉を入力してください"); return; }

  const db = window._db;
  const ref = window._ref;
  const get = window._get;
  const update = window._update;

  const roomRef = ref(db, `rooms/${roomKey}`);
  get(roomRef).then(snapshot => {
    if(!snapshot.exists()){ alert("部屋が見つかりません"); return; }
    const data = snapshot.val();
    if(data.status !== "waiting"){ alert("この部屋はすでに対戦中です"); return; }

    // 空いている手番に入る
    if(!data.first){
      myRole = "first";
      update(roomRef, { first: { name: myName }, status: "ready" });
    } else if(!data.second){
      myRole = "second";
      update(roomRef, { second: { name: myName }, status: "ready" });
    } else {
      alert("部屋が満員です");
      return;
    }
    startOnlineGame();
  });
}
